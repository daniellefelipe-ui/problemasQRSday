async function downloadExcel() {
  const scores = await getScores();
  const wb = XLSX.utils.book_new();

  // Aba: Problemas
  const problemasOnly = S.problemas.filter(p => p.tipo !== 'conflito');
  const ranked = [...problemasOnly].sort((a,b) => (scores[b.id]?.total||0) - (scores[a.id]?.total||0));
  const hProb = ['Nº','Título','Setor Responsável','Cadastrado por','Setor','Descrição','Impacto Interno','Impacto Externo','Custo Direto','Custo de Oportunidade','Score Total','Avaliações'];
  const rProb = ranked.map((p,i) => {
    const s = scores[p.id]||{total:0,count:0};
    return [i+1, p.titulo, p.setor_responsavel, p.leader_name, p.setor_autor, p.descricao_resumida, p.impacto_interno, p.impacto_externo, p.custo_direto, p.custo_oportunidade, s.total, s.count];
  });
  const ws1 = XLSX.utils.aoa_to_sheet([hProb,...rProb]);
  ws1['!cols'] = [{wch:4},{wch:35},{wch:22},{wch:20},{wch:22},{wch:40},{wch:40},{wch:40},{wch:40},{wch:40},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Problemas');

  // Aba: Conflitos
  const conflitos = S.problemas.filter(p => p.tipo === 'conflito');
  if (conflitos.length) {
    const hCf = ['Título','Setor Responsável','Cadastrado por','Setor','Tensão','Impacto','Acordo','Dono'];
    const rCf = conflitos.map(p => [p.titulo, p.setor_responsavel, p.leader_name, p.setor_autor, p.tensao, p.impacto_conflito, p.acordo, p.dono]);
    const wsCf = XLSX.utils.aoa_to_sheet([hCf,...rCf]);
    wsCf['!cols'] = [{wch:30},{wch:22},{wch:20},{wch:22},{wch:40},{wch:40},{wch:40},{wch:20}];
    XLSX.utils.book_append_sheet(wb, wsCf, 'Conflitos');
  }

  // Aba: Indicadores
  const indSnap = await db.ref('indicadores').get();
  if (indSnap.exists()) {
    const hInd = ['Líder','Setor','Indicador','Valor Atual','Unidade','Tendência','Comparação','Valor de Comparação'];
    const rInd = [];
    indSnap.forEach(c => {
      const r = c.val();
      [1,2,3].forEach(i => {
        const ind = r[`ind${i}`];
        if (ind) rInd.push([r.leader_name, r.setor, ind.nome, ind.valor_atual, ind.unidade, ind.tendencia, ind.base, ind.valor_base]);
      });
    });
    const wsInd = XLSX.utils.aoa_to_sheet([hInd,...rInd]);
    wsInd['!cols'] = [{wch:20},{wch:22},{wch:30},{wch:14},{wch:10},{wch:12},{wch:25},{wch:18}];
    XLSX.utils.book_append_sheet(wb, wsInd, 'Indicadores');
  }

  // Aba: Pré-QRS
  const pqSnap = await db.ref('pre_qrs').get();
  if (pqSnap.exists()) {
    const hPq = ['Líder','Setor', ...PRE_QRS_QUESTIONS.map((q,i)=>`P${i+1}`)];
    const rPq = [];
    pqSnap.forEach(c => {
      const r = c.val();
      rPq.push([r.leader_name, r.setor, ...PRE_QRS_QUESTIONS.map(q=>r[q.key])]);
    });
    const ws2 = XLSX.utils.aoa_to_sheet([hPq,...rPq]);
    ws2['!cols'] = [{wch:20},{wch:22},{wch:45},{wch:45},{wch:45},{wch:45}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Balanço do Trimestre');
  }

  // Aba: Compromissos
  const cmSnap = await db.ref('compromissos').get();
  if (cmSnap.exists()) {
    const hCm = ['Líder','Setor','Compromissos assumidos','Comportamentos positivos','Cessar/Reduzir','Decisão necessária da liderança'];
    const rCm = [];
    cmSnap.forEach(c => {
      const v = c.val();
      rCm.push([v.leader_name, v.setor, v.compromissos_assumidos, v.comportamentos_positivos, v.cessar_reduzir, v.decisao_lideranca]);
    });
    const ws4 = XLSX.utils.aoa_to_sheet([hCm,...rCm]);
    ws4['!cols'] = [{wch:20},{wch:22},{wch:45},{wch:45},{wch:45},{wch:45}];
    XLSX.utils.book_append_sheet(wb, ws4, 'Compromissos');
  }

  const fn = `qrs-day-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.xlsx`;
  XLSX.writeFile(wb, fn);
  toast('Excel gerado com todas as abas!', 'ok');
}

// ╔══════════════════════════════════════════════════════════╗
//  PDF
// ╚══════════════════════════════════════════════════════════╝
async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'p', unit:'mm', format:'a4' });
  const W=210, M=18, LW=W-M*2;
  const primary=[13,43,107], accent=[196,154,46], muted=[113,128,150];
  const scores = await getScores();
  let y = 0;

  function np() { doc.addPage(); y=M; }
  function cy(n=20) { if(y+n>280) np(); }
  function tx(text,x,yp,{size=11,color=[26,32,44],bold=false}={}) {
    doc.setFontSize(size); doc.setTextColor(...color);
    doc.setFont('helvetica',bold?'bold':'normal');
    doc.text(String(text||''),x,yp);
  }

  // Capa
  doc.setFillColor(...primary); doc.rect(0,0,W,48,'F');
  tx('ECG',M,22,{size:24,color:[255,255,255],bold:true});
  doc.setTextColor(...accent); doc.setFont('helvetica','bold'); doc.setFontSize(24); doc.text('NOW',M+27,22);
  tx('QRS Day · Reunião de Líderes',M,33,{size:12,color:[220,230,255]});
  tx(S.evento.nome,M,42,{size:10,color:[180,200,240]});
  y=60;
  tx(`Gerado em: ${new Date().toLocaleDateString('pt-BR')}`,M,y,{size:10,color:muted}); y+=6;
  tx(`Fase: ${phaseLabel(S.evento.fase)} · ${S.problemas.length} problemas`,M,y,{size:10,color:muted}); y+=16;

  // Ranking
  const ranked = [...S.problemas].sort((a,b)=>(scores[b.id]?.total||0)-(scores[a.id]?.total||0));
  if (ranked.length) {
    cy(16); tx('RANKING DOS PROBLEMAS',M,y,{size:10,color:muted,bold:true}); y+=8;
    doc.autoTable({
      startY:y,
      head:[['#','Tipo','Item','Setor','Score','Av.']],
      body:ranked.map((p,i)=>[`#${i+1}`,p.tipo==='conflito'?'Conflito':'Problema',p.titulo,p.setor_responsavel,String(scores[p.id]?.total||0),String(scores[p.id]?.count||0)]),
      styles:{font:'helvetica',fontSize:9},
      headStyles:{fillColor:primary,textColor:255,fontStyle:'bold'},
      columnStyles:{0:{cellWidth:10,halign:'center'},1:{cellWidth:20},4:{cellWidth:16,halign:'center'},5:{cellWidth:12,halign:'center'}},
      margin:{left:M,right:M},
    });
    y = doc.lastAutoTable.finalY + 14;
  }

  // Problemas detalhados
  ranked.forEach((p,i) => {
    cy(40); doc.setDrawColor(...primary); doc.setLineWidth(.5); doc.line(M,y,W-M,y); y+=8;
    const titleL = doc.splitTextToSize(p.titulo,LW-14);
    tx(`${i+1}.`,M,y,{size:14,color:primary,bold:true});
    titleL.forEach((l,li)=>tx(l,M+10,y+li*7,{size:13,bold:true})); y+=titleL.length*7+2;
    tx(`Tipo: ${p.tipo==='conflito'?'Conflito':'Problema'} · Setor: ${p.setor_responsavel} · Por: ${p.leader_name} · Score: ${scores[p.id]?.total||0}`,M,y,{size:9,color:muted}); y+=8;
    const c1=M,c2=M+LW/2+4,cW=LW/2-4;
    if (p.tipo === 'conflito') {
      ['tensao','impacto_conflito','acordo'].forEach(k=>{cy(14);tx(({tensao:'TENSÃO',impacto_conflito:'IMPACTO',acordo:'ACORDO'})[k],c1,y,{size:8,color:muted,bold:true});y+=5;doc.splitTextToSize(p[k]||'',LW).forEach(l=>{cy(5);tx(l,c1,y,{size:10});y+=5;});y+=3;});
      cy(14);tx('DONO',c1,y,{size:8,color:muted,bold:true});y+=5;doc.splitTextToSize(p.dono||'',LW).forEach(l=>{cy(5);tx(l,c1,y,{size:10});y+=5;});y+=12;
    } else {
      ['descricao_resumida'].forEach(k=>{cy(14);tx(k.replace(/_/g,' ').toUpperCase(),c1,y,{size:8,color:muted,bold:true});y+=5;doc.splitTextToSize(p[k],LW).forEach(l=>{cy(5);tx(l,c1,y,{size:10});y+=5;});y+=3;});
      cy(24);let y1=y,y2=y;
      tx('IMPACTO INTERNO',c1,y1,{size:8,color:muted,bold:true});y1+=5;doc.splitTextToSize(p.impacto_interno,cW).forEach(l=>{tx(l,c1,y1,{size:10});y1+=5;});
      tx('IMPACTO EXTERNO',c2,y2,{size:8,color:muted,bold:true});y2+=5;doc.splitTextToSize(p.impacto_externo,cW).forEach(l=>{tx(l,c2,y2,{size:10});y2+=5;});
      y=Math.max(y1,y2)+4;
      cy(24);y1=y;y2=y;
      tx('CUSTO DIRETO',c1,y1,{size:8,color:muted,bold:true});y1+=5;doc.splitTextToSize(p.custo_direto,cW).forEach(l=>{tx(l,c1,y1,{size:10});y1+=5;});
      tx('CUSTO DE OPORTUNIDADE',c2,y2,{size:8,color:muted,bold:true});y2+=5;doc.splitTextToSize(p.custo_oportunidade,cW).forEach(l=>{tx(l,c2,y2,{size:10});y2+=5;});
      y=Math.max(y1,y2)+12;
    }
  });

  // Compromissos
  const cmSnap = await db.ref('compromissos').get();
  if (cmSnap.exists()) {
    np();
    doc.setFillColor(...primary); doc.rect(0,0,W,26,'F');
    tx('Compromissos dos Líderes',M,17,{size:14,color:[255,255,255],bold:true});
    const cmRows=[];
    cmSnap.forEach(c=>{const v=c.val();cmRows.push([v.leader_name,v.setor,v.compromissos_assumidos,v.comportamentos_positivos,v.cessar_reduzir,v.decisao_lideranca]);});
    doc.autoTable({startY:34,head:[['Líder','Setor','Compromissos assumidos','Comportamentos positivos','Cessar/Reduzir','Decisão da liderança']],body:cmRows,styles:{font:'helvetica',fontSize:8},headStyles:{fillColor:primary,textColor:255},margin:{left:M,right:M}});
  }

  // Indicadores
  const indSnap2 = await db.ref('indicadores').get();
  if (indSnap2.exists()) {
    np();
    doc.setFillColor(...primary); doc.rect(0,0,W,26,'F');
    tx('Indicadores por Líder',M,17,{size:14,color:[255,255,255],bold:true});
    const indRows=[];
    indSnap2.forEach(c=>{
      const r=c.val();
      [1,2,3].forEach(i=>{ const ind=r[`ind${i}`]; if(ind) indRows.push([r.leader_name, ind.nome, `${ind.valor_atual} ${ind.unidade}`, ind.tendencia, `${ind.base}: ${ind.valor_base} ${ind.unidade}`]); });
    });
    doc.autoTable({startY:34,head:[['Líder','Indicador','Atual','Tendência','Comparação']],body:indRows,styles:{font:'helvetica',fontSize:9},headStyles:{fillColor:primary,textColor:255},margin:{left:M,right:M}});
  }

  doc.save(`qrs-day-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`);
  toast('PDF gerado!', 'ok');
}

// ╔══════════════════════════════════════════════════════════╗
//  REFRESH
// ╚══════════════════════════════════════════════════════════╝
async function renderPhaseContent(f) {
  if      (f === 'manual')        renderManual();
  else if (f === 'pre_qrs')       renderPreQrs();
  else if (f === 'indicadores')   renderIndicadores();
  else if (f === 'submissao')     renderSubmissao();
  else if (f === 'votacao')       renderVotacao();
  else if (f === 'compromissos')  await renderCompromissos();
  else if (f === 'encerrado')     await renderEncerrado();
  bindPhaseProgressNav();
}

async function navigateToPhase(f) {
  S.viewFase = f;
  await loadProblemas();
  await loadMyPreQrs(); await loadMyIndicadores();
  await loadMyAvaliacoes(); await loadMyCompromisso();
  await renderPhaseContent(f);
}

async function refresh() {
  await loadEvento(); await loadProblemas();
  await loadMyPreQrs(); await loadMyIndicadores();
  await loadMyAvaliacoes(); await loadMyCompromisso();
  renderHeader(); await renderAdmin();
  S.viewFase = S.evento.fase;
  await renderPhaseContent(S.viewFase);
}

// ╔══════════════════════════════════════════════════════════╗
//  LOGIN / LOGOUT
// ╚══════════════════════════════════════════════════════════╝
const sel = $id('sel-leader');
LEADERS.forEach(l => {
  const o = document.createElement('option');
  o.value = l.id; o.textContent = `${l.name} · ${l.setor}`;
  sel.appendChild(o);
});

sel.addEventListener('change', () => {
  const found = LEADERS.find(l => l.id === parseInt(sel.value));
  $id('field-senha').hidden = !found;
  $id('btn-forgot').hidden = !found;
  $id('inp-senha').value = '';
  if (found) $id('inp-senha').focus();
});

$id('btn-forgot').addEventListener('click', async () => {
  const id = parseInt(sel.value);
  if (!id) return;
  const leader = LEADERS.find(l => l.id === id);
  const btn = $id('btn-forgot'); btn.disabled=true; btn.textContent='Enviando…';
  try {
    await auth.sendPasswordResetEmail(leader.email);
    toast(`E-mail de redefinição enviado para ${leader.email}`, 'ok');
  } catch(e) {
    toast('Erro ao enviar e-mail. Tente novamente.', 'err');
    console.error(e);
  }
  btn.disabled=false; btn.textContent='Esqueci minha senha';
});

$id('inp-senha').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $id('btn-enter').click();
});

$id('btn-enter').addEventListener('click', async () => {
  const id = parseInt(sel.value);
  if (!id) { toast('Selecione seu nome.', 'err'); return; }
  const leader = LEADERS.find(l => l.id === id);
  const senha = $id('inp-senha').value;
  if (!senha) { toast('Digite sua senha.', 'err'); $id('inp-senha').focus(); return; }
  const btn = $id('btn-enter'); btn.disabled=true; btn.textContent='Entrando…';
  try {
    await auth.signInWithEmailAndPassword(leader.email, senha);
    // onAuthStateChanged cuida do resto
  } catch(e) {
    btn.disabled=false; btn.textContent='Entrar';
    if (['auth/wrong-password','auth/invalid-credential','auth/invalid-login-credentials'].includes(e.code)) {
      toast('Senha incorreta. Verifique e tente novamente.', 'err');
    } else if (e.code === 'auth/user-not-found') {
      toast('Conta não encontrada. Peça ao admin para criar as contas.', 'err');
    } else {
      toast('Erro ao entrar: ' + e.code, 'err');
      console.error(e);
    }
    $id('inp-senha').value = ''; $id('inp-senha').focus();
  }
});

$id('btn-logout').addEventListener('click', () => auth.signOut());

// Cria contas Firebase Auth para todos os líderes (uso único pelo admin)
async function setupAuth() {
  if (!S.leader?.isAdmin) return;
  const SENHA_PADRAO = 'QRSDay@2025';
  const tempApp  = firebase.initializeApp(FIREBASE_CONFIG, 'setup_' + Date.now());
  const tempAuth = tempApp.auth();
  let criadas = 0, existentes = 0;
  for (const l of LEADERS) {
    try {
      await tempAuth.createUserWithEmailAndPassword(l.email, SENHA_PADRAO);
      await tempAuth.signOut();
      criadas++;
    } catch(e) {
      if (e.code === 'auth/email-already-in-use') existentes++;
      else console.warn(l.email, e.message);
    }
    // Marca troca de senha obrigatória para não-admins
    if (!l.isAdmin) await db.ref(`usuarios_flags/${l.id}/mustChangePassword`).set(true);
  }
  await tempApp.delete();
  toast(`Contas: ${criadas} criadas, ${existentes} já existiam. Senha padrão: ${SENHA_PADRAO}`, 'ok');
}

// Gerencia sessão via Firebase Auth (substitui localStorage)
auth.onAuthStateChanged(async (user) => {
  if (user) {
    const leader = LEADERS.find(l => l.email.toLowerCase() === user.email.toLowerCase());
    if (!leader) { await auth.signOut(); return; }
    S.leader = leader;
    const btn = $id('btn-enter');
    if (btn) { btn.disabled=false; btn.textContent='Entrar'; }
    try {
      // Registra o UID real do Firebase para permitir regras granulares no banco
      await db.ref(`leader_uid/${leader.id}`).set(user.uid).catch(() => {});
      // Verifica se precisa trocar a senha
      const flagSnap = await db.ref(`usuarios_flags/${leader.id}/mustChangePassword`).get();
      if (flagSnap.val() === true) {
        hide('view-login'); hide('view-app'); show('view-change-password');
        return;
      }
      await refresh();
      hide('view-login'); hide('view-change-password'); show('view-app');
    } catch(e) {
      console.error(e);
      await auth.signOut();
    }
  } else {
    S = { leader:null, evento:null, problemas:[], viewFase:null, myPreQrs:null, myIndicadores:null, myAvaliacoes:{}, myCompromisso:null };
    hide('view-app'); hide('view-change-password'); show('view-login');
    const btn = $id('btn-enter');
    if (btn) { btn.disabled=false; btn.textContent='Entrar'; }
  }
});

// Troca de senha obrigatória no primeiro acesso
$id('btn-salvar-senha').addEventListener('click', async () => {
  const senhaAtual = $id('inp-senha-atual').value;
  const nova       = $id('inp-nova-senha').value;
  const confirma   = $id('inp-confirma-senha').value;
  if (!senhaAtual)                 { toast('Informe a senha atual.', 'err'); return; }
  if (nova.length < 8)             { toast('Senha deve ter pelo menos 8 caracteres.', 'err'); return; }
  if (nova === 'QRSDay@2025')      { toast('Use uma senha diferente da padrão.', 'err'); return; }
  if (nova === senhaAtual)         { toast('A nova senha deve ser diferente da atual.', 'err'); return; }
  if (nova !== confirma)           { toast('As senhas não coincidem.', 'err'); return; }
  const btn = $id('btn-salvar-senha'); btn.disabled=true; btn.textContent='Salvando…';
  try {
    const credential = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, senhaAtual);
    await auth.currentUser.reauthenticateWithCredential(credential);
    await auth.currentUser.updatePassword(nova);
    await db.ref(`usuarios_flags/${S.leader.id}/mustChangePassword`).remove();
    toast('Senha definida! Bem-vinda ao QRS Day.', 'ok');
    await refresh();
    hide('view-change-password'); show('view-app');
  } catch(e) {
    btn.disabled=false; btn.textContent='Definir senha e entrar';
    if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
      toast('Senha atual incorreta. Verifique e tente novamente.', 'err');
    } else {
      toast('Erro ao salvar senha. Tente novamente.', 'err');
    }
    console.error(e);
  }
});
</script>
