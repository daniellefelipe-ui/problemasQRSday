<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRS Day · ECGNOW</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --p:#0D2B6B;--pd:#091E4D;--pl:#E8EDF8;
      --a:#C49A2E;--al:#FBF3DC;
      --g:#276749;--gl:#F0FFF4;
      --red:#9B2335;--redl:#FFF5F5;
      --bg:#F0F4F8;--card:#fff;
      --text:#1A202C;--muted:#718096;--border:#E2E8F0;
      --r:12px;--sh:0 2px 14px rgba(0,0,0,.08)
    }
    body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    h1,h2,h3,h4,h5{font-family:'Montserrat',sans-serif}
    [hidden]{display:none!important}

    /* ── Login ─────────────────────────────────────────── */
    #view-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:48px 40px;width:100%;max-width:420px;text-align:center}
    .brand{font-size:30px;font-weight:700;color:var(--p);margin-bottom:2px}
    .brand span{color:var(--a)}
    .brand-sub{font-size:14px;color:var(--muted);margin-bottom:36px;font-family:'Roboto',sans-serif;font-weight:400}

    /* ── Forms ──────────────────────────────────────────── */
    .field{margin-bottom:20px;text-align:left}
    .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Roboto',sans-serif;font-size:15px;color:var(--text);background:#fff;transition:border-color .2s;outline:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p)}
    .field textarea{resize:vertical;min-height:90px;line-height:1.6}

    /* ── Buttons ─────────────────────────────────────────── */
    .btn{padding:11px 22px;border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
    .btn-primary{background:var(--p);color:#fff}.btn-primary:hover{background:var(--pd)}
    .btn-accent{background:var(--a);color:#fff}.btn-accent:hover{background:#a8851f}
    .btn-green{background:var(--g);color:#fff}.btn-green:hover{background:#1e5238}
    .btn-outline{background:transparent;border:1.5px solid var(--p);color:var(--p)}.btn-outline:hover{background:var(--pl)}
    .btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25)}.btn-ghost:hover{background:rgba(255,255,255,.22)}
    .btn-danger{background:var(--redl);color:var(--red);border:1.5px solid #FED7D7}.btn-danger:hover{background:#FED7D7}
    .btn-sm{padding:7px 14px;font-size:12px}
    .btn-full{width:100%;justify-content:center}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    /* ── Header ──────────────────────────────────────────── */
    #app-header{background:var(--p);color:#fff;padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.18);position:sticky;top:0;z-index:100}
    .header-brand{font-size:19px;font-weight:700}.header-brand span{color:var(--a)}
    .header-right{display:flex;align-items:center;gap:12px}
    .user-chip{background:rgba(255,255,255,.15);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;line-height:1.3;text-align:right}
    .user-chip small{display:block;font-size:11px;opacity:.75;font-weight:400}

    /* ── Phase badge ─────────────────────────────────────── */
    .fase-badge{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:'Montserrat',sans-serif}
    .fase-manual{background:#F1F5F9;color:#334155}
    .fase-pre_qrs{background:#F0E6FF;color:#6B21A8}
    .fase-indicadores{background:#E6FFFA;color:#0F766E}
    .fase-submissao{background:var(--al);color:#8B6914}
    .fase-votacao{background:#EBF8FF;color:#2B6CB0}
    .fase-compromissos{background:var(--gl);color:var(--g)}
    .fase-encerrado{background:#F1F5F9;color:#475569}

    /* ── Main ────────────────────────────────────────────── */
    #app-main{max-width:860px;margin:0 auto;padding:28px 20px}

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs{display:flex;gap:4px;background:#E2E8F0;padding:4px;border-radius:10px;margin-bottom:24px}
    .tab{flex:1;padding:9px 12px;border:none;background:transparent;border-radius:7px;font-family:'Montserrat',sans-serif;font-weight:600;font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;text-align:center}
    .tab.active{background:#fff;color:var(--p);box-shadow:0 1px 4px rgba(0,0,0,.1)}

    /* ── Section header ──────────────────────────────────── */
    .sec-title{font-size:21px;font-weight:700;margin-bottom:6px}
    .sec-sub{font-size:14px;color:var(--muted);margin-bottom:22px}

    /* ── Form card sections ──────────────────────────────── */
    .form-block{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:26px;margin-bottom:14px}
    .form-block-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--p);margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--pl)}

    /* ── Generic cards ───────────────────────────────────── */
    .my-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px 22px;margin-bottom:12px;display:flex;align-items:flex-start;gap:16px}
    .my-card-body{flex:1}
    .my-card-title{font-size:16px;font-weight:600;margin-bottom:4px}
    .my-card-meta{font-size:13px;color:var(--muted)}
    .my-card-actions{display:flex;gap:8px;flex-shrink:0}
    .num-badge{width:34px;height:34px;background:var(--pl);color:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;margin-top:2px}

    /* ── Pré-QRS ─────────────────────────────────────────── */
    .preqrs-q{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:22px 26px;margin-bottom:12px}
    .preqrs-q-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--p);margin-bottom:8px}
    .preqrs-q-text{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.5}
    .preqrs-answer{background:var(--pl);border-radius:8px;padding:14px 16px;font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap}
    .preqrs-done-card{background:var(--gl);border:1.5px solid #9AE6B4;border-radius:var(--r);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
    .preqrs-done-icon{font-size:28px}
    .preqrs-done-text{font-size:14px;color:var(--g);font-weight:500}

    /* ── Indicadores ─────────────────────────────────────── */
    .ind-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:22px 26px;margin-bottom:14px}
    .ind-card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#0F766E;margin-bottom:14px}
    .ind-tip{background:#E6FFFA;border:1px solid #99F6E4;border-radius:8px;padding:11px 14px;font-size:13px;color:#0F766E;margin-bottom:16px;line-height:1.55}
    .ind-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
    .ind-row2{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:12px;margin-top:4px}
    .draft-ind{font-size:12px;color:var(--g);opacity:0;transition:opacity .3s;margin-left:10px}
    .ind-display{background:var(--bg);border-radius:8px;padding:16px 18px;margin-bottom:10px}
    .ind-display-name{font-size:14px;font-weight:700;margin-bottom:6px}
    .ind-display-vals{display:flex;gap:18px;font-size:13px;color:var(--muted)}
    .ind-display-vals strong{color:var(--text);font-size:16px;font-family:'Montserrat',sans-serif}
    .ind-trend{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:6px}
    .ind-trend.melhorou{background:var(--gl);color:var(--g)}
    .ind-trend.piorou{background:var(--redl);color:var(--red)}
    .ind-trend.estavel{background:var(--pl);color:var(--p)}
    canvas.ind-chart{max-height:90px}

    /* ── Conflito ────────────────────────────────────────── */
    .conflito-card{border-left:4px solid #B45309!important}
    .chip-conflito{background:#FEF3C7;color:#B45309}
    .chip-problema{background:var(--al);color:#8B6914}

    /* ── Admin responses list ────────────────────────────── */
    .resp-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px 24px;margin-bottom:12px}
    .resp-card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .resp-card-name{font-size:15px;font-weight:700}
    .resp-card-setor{font-size:12px;color:var(--muted)}
    .resp-item{margin-bottom:14px}
    .resp-item-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px}
    .resp-item-value{font-size:14px;line-height:1.65;color:var(--text)}

    /* ── Tipo selector (Problema / Conflito) ────────────── */
    .tipo-selector{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
    .tipo-card{border:2px solid var(--border);border-radius:var(--r);padding:18px 16px;background:#fff;cursor:pointer;text-align:left;transition:border-color .18s,background .18s,box-shadow .18s;font-family:inherit;width:100%}
    .tipo-card:hover{border-color:var(--p);background:#F5F0FF}
    .tipo-card.active{border-color:var(--p);background:#F5F0FF;box-shadow:0 0 0 3px rgba(99,57,185,.12)}
    .tipo-card[data-tipo="conflito"]:hover,.tipo-card[data-tipo="conflito"].active{border-color:#D97706;background:#FFFBEB;box-shadow:0 0 0 3px rgba(217,119,6,.12)}
    .tipo-card-icon{font-size:26px;margin-bottom:8px;display:block}
    .tipo-card-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;color:var(--p);margin-bottom:4px}
    .tipo-card[data-tipo="conflito"] .tipo-card-title{color:#D97706}
    .tipo-card[data-tipo="conflito"].active .tipo-card-title{color:#92400E}
    .tipo-card-desc{font-size:12px;color:var(--muted);line-height:1.45}

    /* ── Criteria rating ─────────────────────────────────── */
    .criteria-bar{background:var(--pd);color:#fff;padding:9px 24px;text-align:center;font-size:14px;position:sticky;top:62px;z-index:90}
    .criteria-bar strong{font-family:'Montserrat',sans-serif;font-size:18px}
    .v-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:2px solid transparent;margin-bottom:14px;overflow:hidden;transition:border-color .2s}
    .v-card.rated{border-color:var(--g)}
    .v-card-head{padding:18px 22px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:14px}
    .v-card-head:hover{background:#FAFAFA}
    .v-card-info{flex:1}
    .v-card-title{font-size:16px;font-weight:600;margin-bottom:4px}
    .v-card-meta{font-size:13px;color:var(--muted)}
    .v-card-arrow{font-size:18px;color:var(--muted);margin-top:2px;flex-shrink:0;transition:transform .2s}
    .v-card.open .v-card-arrow{transform:rotate(180deg)}
    .v-card-body{padding:0 22px 18px;border-top:1px solid var(--border);display:none}
    .v-card.open .v-card-body{display:block}
    .v-card-footer{padding:12px 22px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .rated-label{background:var(--gl);color:var(--g);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;font-family:'Montserrat',sans-serif}
    .score-preview{font-size:12px;color:var(--muted)}
    .score-preview strong{color:var(--p);font-size:14px}

    /* ── Criteria modal ──────────────────────────────────── */
    .crit-section{margin-bottom:22px}
    .crit-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
    .crit-hint{font-size:12px;color:var(--muted);margin-bottom:12px}
    .crit-btns{display:flex;gap:6px}
    .crit-btn{flex:1;padding:12px 4px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;color:var(--muted);text-align:center}
    .crit-btn.sel{border-color:var(--p);background:var(--pl);color:var(--p)}
    .crit-btn:hover:not(.sel){background:var(--bg)}
    .crit-score-total{text-align:center;padding:16px;background:var(--pl);border-radius:8px;margin-top:4px}
    .crit-score-total strong{font-size:28px;color:var(--p);font-family:'Montserrat',sans-serif}
    .crit-score-total span{font-size:13px;color:var(--muted)}

    /* ── Results ─────────────────────────────────────────── */
    .res-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px 22px;margin-bottom:12px;display:flex;align-items:center;gap:18px}
    .rank{font-size:26px;font-weight:700;color:var(--p);font-family:'Montserrat',sans-serif;min-width:38px}
    .res-info{flex:1}
    .res-title{font-size:16px;font-weight:600;margin-bottom:3px}
    .res-meta{font-size:13px;color:var(--muted);margin-bottom:6px}
    .res-criteria{display:flex;gap:8px;font-size:11px}
    .res-crit-item{background:var(--bg);border-radius:4px;padding:3px 8px;color:var(--muted)}
    .res-crit-item strong{color:var(--p)}
    .res-score{text-align:right;min-width:70px}
    .res-score strong{display:block;font-size:26px;font-weight:700;color:var(--p);font-family:'Montserrat',sans-serif;line-height:1}
    .res-score small{font-size:11px;color:var(--muted)}
    .progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
    .progress-fill{height:100%;background:var(--p);border-radius:3px}
    .res-rank-1 .rank,.res-rank-1 .res-score strong{color:var(--a)}

    /* ── Compromissos ────────────────────────────────────── */
    .comp-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:22px 24px;margin-bottom:12px;border-left:4px solid var(--g)}
    .comp-card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .comp-card-name{font-size:15px;font-weight:700}
    .comp-card-setor{font-size:12px;color:var(--muted)}
    .comp-item{margin-bottom:14px}
    .comp-item-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g);margin-bottom:6px}
    .comp-item-value{font-size:14px;line-height:1.7;color:var(--text)}
    .comp-done-card{background:var(--gl);border:1.5px solid #9AE6B4;border-radius:var(--r);padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:12px}

    /* ── Admin panel ─────────────────────────────────────── */
    #admin-panel{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:26px;margin-bottom:22px;border-left:4px solid var(--a)}
    .admin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .admin-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
    .admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
    .stat{text-align:center;padding:14px;background:var(--bg);border-radius:8px}
    .stat-n{font-size:28px;font-weight:700;color:var(--p);font-family:'Montserrat',sans-serif}
    .stat-l{font-size:12px;color:var(--muted);margin-top:3px}
    .admin-actions{display:flex;gap:10px;flex-wrap:wrap}

    /* ── Detail grid inside cards ────────────────────────── */
    .dg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
    .dg-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
    .dg-value{font-size:14px;line-height:1.65;color:var(--text)}
    .dg-full{grid-column:span 2}

    /* ── Toast ───────────────────────────────────────────── */
    #toast{position:fixed;bottom:22px;right:22px;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:999;transform:translateY(16px);opacity:0;transition:all .28s;pointer-events:none;max-width:320px}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.ok{background:#276749;color:#fff}
    #toast.err{background:#9B2335;color:#fff}
    #toast.info{background:#2B6CB0;color:#fff}

    /* ── Modal ───────────────────────────────────────────── */
    #modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
    #modal-box{background:#fff;border-radius:var(--r);width:100%;max-width:680px;max-height:88vh;overflow-y:auto;padding:30px}
    .modal-title{font-size:20px;font-weight:700;color:var(--p);margin-bottom:22px}
    .modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}

    /* ── Chips ───────────────────────────────────────────── */
    .chip{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600}
    .chip-p{background:var(--pl);color:var(--p)}
    .chip-a{background:var(--al);color:#8B6914}
    .chip-g{background:var(--gl);color:var(--g)}

    /* ── Loader ──────────────────────────────────────────── */
    .loader{text-align:center;padding:56px 20px;color:var(--muted)}
    .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty-icon{font-size:44px;margin-bottom:14px}
    .empty-t{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}

    /* ── Phase progress ──────────────────────────────────── */
    .phase-progress{display:flex;align-items:center;gap:0;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
    .pp-step{display:flex;align-items:center;gap:0;flex-shrink:0}
    .pp-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;border:2px solid var(--border);background:#fff;color:var(--muted)}
    .pp-dot.done{background:var(--g);border-color:var(--g);color:#fff}
    .pp-dot.active{background:var(--p);border-color:var(--p);color:#fff}
    .pp-dot.pending{background:#FFF5F5;border-color:var(--red);color:var(--red)}
    .pp-label{font-size:10px;color:var(--muted);text-align:center;margin-top:4px;font-family:'Montserrat',sans-serif;font-weight:600;white-space:nowrap}
    .pp-label.active{color:var(--p)}
    .pp-label.done{color:var(--g)}
    .pp-label.pending{color:var(--red)}
    .pp-inner{display:flex;flex-direction:column;align-items:center}
    .pp-line{width:24px;height:2px;background:var(--border);margin-bottom:20px;flex-shrink:0}
    .pp-line.done{background:var(--g)}
    .pp-line.pending{background:var(--red)}
    .pp-clickable{cursor:pointer}
    .pp-clickable:hover .pp-dot{filter:brightness(0.92)}
    .pp-clickable:hover .pp-label{text-decoration:underline}
    .phase-nav-bar{display:flex;justify-content:space-between;gap:10px;margin-bottom:22px}

    /* ── Phase description ───────────────────────────────── */
    .phase-desc-box{display:flex;align-items:flex-start;gap:14px;background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:16px 20px;margin-bottom:22px;border-left:4px solid var(--p);font-size:14px;line-height:1.6;color:var(--text)}

function draftKey(tipo) { return `qrsday_draft_${tipo}_${S.leader?.id}`; }
function saveDraft(tipo, data) { try { localStorage.setItem(draftKey(tipo), JSON.stringify(data)); } catch {} }
function loadDraft(tipo) { try { return JSON.parse(localStorage.getItem(draftKey(tipo))); } catch { return null; } }
function clearDraft(tipo) { try { localStorage.removeItem(draftKey(tipo)); } catch {} }

function bindAutosave(tipo, formEl, getDataFn) {
  const ind = formEl.querySelector('.draft-ind');
  let timer;
  const doSave = () => {
    saveDraft(tipo, getDataFn(formEl));
    if (ind) { ind.textContent = '✓ Rascunho salvo'; ind.style.opacity = '1'; clearTimeout(ind._t); ind._t = setTimeout(() => ind.style.opacity='0', 2500); }
  };
  formEl.addEventListener('input',  () => { clearTimeout(timer); timer = setTimeout(doSave, 900); });
  formEl.addEventListener('change', () => { clearTimeout(timer); timer = setTimeout(doSave, 300); });
}

const $id = id => document.getElementById(id);
const show = id => $id(id).hidden = false;
const hide = id => $id(id).hidden = true;
let _tt;
function toast(msg, type='ok') {
  const el = $id('toast');
  el.className = `${type} show`; el.textContent = msg;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3200);
}
const fmtDate = ts => new Date(ts).toLocaleDateString('pt-BR');
const escHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const phaseLabel = f => PHASE_LABELS[f] || f;
const phaseCss   = f => PHASE_CSS[f] || '';

async function loadEvento() {
  const snap = await db.ref('evento').get();
  if (!snap.exists()) {
    const novo = { nome:'QRS Day · ' + new Date().toLocaleDateString('pt-BR',{month:'2-digit',year:'numeric'}), fase:'manual' };
    await db.ref('evento').set(novo); S.evento = novo;
  } else S.evento = snap.val();
}

async function loadProblemas() {
  const snap = await db.ref('problemas').get();
  S.problemas = [];
  if (snap.exists()) {
    snap.forEach(c => S.problemas.push({ id: c.key, ...c.val() }));
    S.problemas.sort((a,b) => a.created_at - b.created_at);
  }
}

async function loadMyPreQrs() {
  const snap = await db.ref(`pre_qrs/${S.leader.id}`).get();
  S.myPreQrs = snap.exists() ? snap.val() : null;
}

async function loadMyIndicadores() {

}

async function loadMyAvaliacoes() {
  const snap = await db.ref('avaliacoes').get();

  if (snap.exists()) snap.forEach(c => {

// ╔══════════════════════════════════════════════════════════╗
//  FIREBASE — ESCRITA

async function savePreQrs(data) {
  const payload = { ...data, leader_name: S.leader.name, setor: S.leader.setor, submitted_at: Date.now() };
  await db.ref(`pre_qrs/${S.leader.id}`).set(payload);
  S.myPreQrs = payload;
}

async function saveIndicadores(inds) {
  const payload = { leader_name: S.leader.name, setor: S.leader.setor, submitted_at: Date.now() };
  inds.forEach((ind, i) => { payload[`ind${i+1}`] = ind || null; });
  await db.ref(`indicadores/${S.leader.id}`).set(payload);
  S.myIndicadores = payload;
}

async function saveAvaliacao(problemaId, impacto, urgencia, controle) {
  const key = `${S.leader.id}_${problemaId}`;
  const data = { leader_id: S.leader.id, problema_id: problemaId, impacto, urgencia, controle, score: impacto*urgencia*controle, created_at: Date.now() };
  await db.ref(`avaliacoes/${key}`).set(data);
  S.myAvaliacoes[problemaId] = data;
}

async function submitProblem(data) {
  await db.ref('problemas').push({ ...data, leader_id: S.leader.id, leader_name: S.leader.name, setor_autor: S.leader.setor, created_at: Date.now() });
}

async function deleteProblem(id) {
  const snap = await db.ref(`problemas/${id}`).get();
  if (snap.exists() && snap.val().leader_id === S.leader.id) {
    await db.ref(`problemas/${id}`).remove();
    const avSnap = await db.ref('avaliacoes').get();
    if (avSnap.exists()) {
      const upd = {};
      avSnap.forEach(c => { if (c.val().problema_id === id) upd[c.key] = null; });
      if (Object.keys(upd).length) await db.ref('avaliacoes').update(upd);
    }
  }
}

async function saveCompromisso(data) {
  const payload = { ...data, leader_name: S.leader.name, setor: S.leader.setor, submitted_at: Date.now() };
  await db.ref(`compromissos/${S.leader.id}`).set(payload);
  S.myCompromisso = payload;
}

async function updateFase(fase) {
  await db.ref('evento/fase').set(fase);
  S.evento.fase = fase;
}

async function getScores() {
  const snap = await db.ref('avaliacoes').get();
  const scores = {};
  if (snap.exists()) snap.forEach(c => {
    const v = c.val();
    if (!scores[v.problema_id]) scores[v.problema_id] = { impacto:0, urgencia:0, controle:0, total:0, count:0 };
    scores[v.problema_id].impacto  += v.impacto;
    scores[v.problema_id].urgencia += v.urgencia;
    scores[v.problema_id].controle += v.controle;
    scores[v.problema_id].total    += v.score;
    scores[v.problema_id].count++;
  });
  return scores;
}

const PHASE_DESC = {
  manual:       { emoji:'📖', titulo:'Manual do QRS Day', desc:'Antes de começar, entenda o que será preenchido em cada etapa da reunião.' },
  pre_qrs:      { emoji:'✍️', titulo:'Balanço do Trimestre', desc:'Responda 4 perguntas de reflexão antes da reunião. Seja honesto — suas respostas guiarão as discussões do dia.' },
  indicadores:  { emoji:'📈', titulo:'Indicadores', desc:'Compartilhe até 3 indicadores do seu setor neste trimestre, comparando com o último trimestre ou com o mesmo período do ano passado.' },
  submissao:    { emoji:'📋', titulo:'Submissão de Problemas e Conflitos', desc:'Cadastre os problemas e conflitos que você quer colocar em pauta. Descreva o impacto para que todos entendam a gravidade.' },
  votacao:      { emoji:'🎯', titulo:'Votação por Critérios', desc:'Avalie cada problema de 1 a 3 em três dimensões: Impacto, Urgência e Controle. O score é o produto das notas (máx. 27) e o sistema calcula o ranking automaticamente.' },
  compromissos: { emoji:'💚', titulo:'Compromissos Finais', desc:'O QRS Day não termina com diagnóstico — termina com decisão. Escreva o que você assume para os próximos 90 dias e o que pode ser cobrado de você.' },
  encerrado:    { emoji:'🏁', titulo:'QRS Day Encerrado', desc:'Confira o ranking final dos problemas e os compromissos assumidos pela liderança. Os resultados ficam salvos no histórico.' },
};

function myPhaseCompletion() {
  const cur = PHASES.indexOf(S.evento.fase);
  const totalProbs = S.problemas.length;
  return {
    manual:       true,
    pre_qrs:      S.myPreQrs !== null,
    indicadores:  S.myIndicadores !== null,
    submissao:    cur > PHASES.indexOf('submissao'), // fase passou
    votacao:      totalProbs > 0 && Object.keys(S.myAvaliacoes).length >= totalProbs,
    compromissos: S.myCompromisso !== null,
    encerrado:    true,
  };
}

function phaseProgress() {
  const cur = PHASES.indexOf(S.evento.fase);
  const viewIdx = PHASES.indexOf(S.viewFase || S.evento.fase);
  const completion = myPhaseCompletion();
  const steps = PHASES.map((p,i) => {
    const past   = i < cur;
    const active = i === viewIdx;
    const done   = completion[p];
    let dotClass = active ? 'active' : '';
    let dotContent = i + 1;
    if (past && done)  { dotClass = 'done';    dotContent = '✓'; }
    if (past && !done) { dotClass = 'pending';  dotContent = '!'; }
    if (active) dotContent = i + 1;
    return `<div class="pp-step">
      <div class="pp-inner pp-clickable" data-fase="${p}">
        <div class="pp-dot ${dotClass}">${dotContent}</div>
        <div class="pp-label ${active?'active':past&&done?'done':past&&!done?'pending':''}">${phaseLabel(p).replace(' Incômodas','')}</div>
      </div>
      ${i < PHASES.length-1 ? `<div class="pp-line ${past?done?'done':'pending':''}"></div>` : ''}
    </div>`;
  }).join('');

  const viewFase = S.viewFase || S.evento.fase;
  const d = PHASE_DESC[viewFase];
  const desc = d ? `<div class="phase-desc-box">
    <span class="phase-desc-emoji">${d.emoji}</span>
    <div><strong>${d.titulo}</strong><br>${d.desc}</div>
  </div>` : '';

  const prevP = PHASES[viewIdx - 1];
  const nextP = PHASES[viewIdx + 1];
  const nav = `<div class="phase-nav-bar">
    <button class="btn btn-outline" id="btn-view-prev" ${prevP ? '' : 'disabled'}>← Bloco anterior</button>
    <button class="btn btn-outline" id="btn-view-next" ${nextP ? '' : 'disabled'}>Próximo bloco →</button>
  </div>`;

  return `<div class="phase-progress">${steps}</div>${desc}${nav}`;
}

function bindPhaseProgressNav() {
  document.querySelectorAll('.pp-clickable').forEach(el => {
    el.addEventListener('click', () => navigateToPhase(el.dataset.fase));
  });
  const prevBtn = $id('btn-view-prev');
  const nextBtn = $id('btn-view-next');
  const viewIdx = PHASES.indexOf(S.viewFase || S.evento.fase);
  if (prevBtn) prevBtn.addEventListener('click', () => { const p = PHASES[viewIdx-1]; if (p) navigateToPhase(p); });
  if (nextBtn) nextBtn.addEventListener('click', () => { const p = PHASES[viewIdx+1]; if (p) navigateToPhase(p); });
}

  const f = S.evento.fase;
  const nextPhase = PHASES[PHASES.indexOf(f)+1];
  const prevPhase = PHASES[PHASES.indexOf(f)-1];

  let btns = '';
  if (nextPhase) btns += `<button class="btn btn-primary" id="btn-next-phase">▶ Avançar para ${phaseLabel(nextPhase)}</button>`;
  if (prevPhase) btns += `<button class="btn btn-outline" id="btn-prev-phase">↩ Voltar para ${phaseLabel(prevPhase)}</button>`;
  if (f === 'encerrado') btns += `<button class="btn btn-green" id="btn-novo-qrs">🔄 Novo QRS Day</button>`;
  btns += `<button class="btn btn-accent" id="btn-pdf">⬇ PDF</button>`;
  btns += `<button class="btn btn-outline" id="btn-excel">📊 Excel</button>`;
  btns += `<button class="btn btn-outline" id="btn-historico">🗂 Histórico</button>`;
  btns += `<button class="btn btn-outline" id="btn-setup-auth">🔐 Criar Contas</button>`;
  btns += `<button class="btn btn-outline" id="btn-view-preqrs">👁 Ver Check-in</button>`;
  btns += `<button class="btn btn-outline" id="btn-view-ind">📈 Ver Indicadores</button>`;
  btns += `<button class="btn btn-outline" id="btn-view-prob">📋 Ver Problemas</button>`;
  btns += `<button class="btn btn-outline" id="btn-view-comp">👁 Ver Compromissos</button>`;
  if (f === 'votacao')
    btns += `<button class="btn btn-primary" id="btn-admin-votar">🗳 Votar agora</button>`;

  $id('admin-actions').innerHTML = btns;

  $id('btn-next-phase')?.addEventListener('click', () => changePhase(nextPhase));
  $id('btn-prev-phase')?.addEventListener('click', () => changePhase(prevPhase));
  $id('btn-novo-qrs')?.addEventListener('click', novoQrsDay);
  $id('btn-pdf')?.addEventListener('click', downloadPDF);
  $id('btn-excel')?.addEventListener('click', downloadExcel);
  $id('btn-historico')?.addEventListener('click', adminViewHistorico);
  $id('btn-setup-auth')?.addEventListener('click', setupAuth);
  $id('btn-view-preqrs')?.addEventListener('click', adminViewPreQrs);
  $id('btn-view-ind')?.addEventListener('click', adminViewIndicadores);
  $id('btn-view-prob')?.addEventListener('click', adminViewProblemas);
  $id('btn-view-comp')?.addEventListener('click', adminViewCompromissos);
  $id('btn-admin-votar')?.addEventListener('click', () => { renderVotacao(); window.scrollTo({top:$id('content-area').offsetTop, behavior:'smooth'}); });

  if (f === 'votacao') await renderVotacaoRanking(); else if ($id('admin-ranking-panel')) hide('admin-ranking-panel');
}

async function renderVotacaoRanking() {
  let panel = $id('admin-ranking-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'admin-ranking-panel';
    $id('admin-panel').appendChild(panel);
  }
  show('admin-ranking-panel');
  const scores = await getScores();
  const ranked = [...S.problemas].sort((a,b) => (scores[b.id]?.total||0) - (scores[a.id]?.total||0));
  const maxScore = scores[ranked[0]?.id]?.total || 1;
  panel.innerHTML = `
    <div class="sec-title" style="margin-top:18px">🏆 Ranking ao vivo</div>
    ${ranked.map((p,i) => {
      const s = scores[p.id] || { total:0, count:0 };
      return `<div class="res-card${i===0?' res-rank-1':''}" style="margin-bottom:8px">
        <div class="rank">${i===0?'🥇':`#${i+1}`}</div>
        <div class="res-info">
          <div class="res-title">${escHtml(p.titulo)}</div>
          <div class="res-meta">${tipoChip(p)} <span class="chip chip-a">${escHtml(p.setor_responsavel)}</span> · ${s.count} avaliações</div>
          <div class="progress"><div class="progress-fill" style="width:${Math.round((s.total/maxScore)*100)}%"></div></div>
        </div>
        <div class="res-score"><strong>${s.total}</strong><small>pontos</small></div>
      </div>`;
    }).join('') || '<div class="sec-sub">Nenhum problema cadastrado.</div>'}`;
}

async function changePhase(fase) {
  try { await updateFase(fase); toast(`Fase: ${phaseLabel(fase)}`, 'ok'); await refresh(); }
  catch(e) { toast('Erro ao alterar fase.', 'err'); }
}

async function novoQrsDay() {
  if (!confirm('Arquivar o QRS Day atual e iniciar um novo?\n\nTodos os dados ficam salvos no Histórico.')) return;

  const btn = $id('btn-novo-qrs');
  if (btn) { btn.disabled = true; btn.textContent = 'Arquivando…'; }

  try {
    // Lê todos os dados atuais
    const [evSnap, prSnap, pqSnap, indSnap, vdSnap, avSnap, cmSnap, vtSnap] = await Promise.all([
      db.ref('evento').get(),
      db.ref('problemas').get(),
      db.ref('pre_qrs').get(),
      db.ref('indicadores').get(),
      db.ref('verdades').get(),
      db.ref('avaliacoes').get(),
      db.ref('compromissos').get(),
      db.ref('votos').get(),
    ]);

    // Monta o pacote do histórico
    const id = Date.now();
    const arquivo = {
      evento:       evSnap.exists()  ? evSnap.val()                       : {},
      problemas:    prSnap.exists()  ? prSnap.val()                       : {},
      pre_qrs:      pqSnap.exists()  ? pqSnap.val()                       : {},
      indicadores:  indSnap.exists() ? indSnap.val()                      : {},
      verdades:     vdSnap.exists()  ? vdSnap.val()                       : {},
      avaliacoes:   avSnap.exists()  ? avSnap.val()                       : {},
      compromissos: cmSnap.exists()  ? cmSnap.val()                       : {},
      votos:        vtSnap.exists()  ? vtSnap.val()                       : {},
      arquivado_em: id,
    };

    // Salva no histórico e limpa coleções ativas
    await db.ref(`historico/${id}`).set(arquivo);
    await Promise.all([
      db.ref('problemas').remove(),
      db.ref('pre_qrs').remove(),
      db.ref('indicadores').remove(),
      db.ref('verdades').remove(),
      db.ref('avaliacoes').remove(),
      db.ref('compromissos').remove(),
      db.ref('votos').remove(),
    ]);

    // Cria novo evento
    const novoNome = 'QRS Day · ' + new Date().toLocaleDateString('pt-BR', { month: '2-digit', year: 'numeric' });
    await db.ref('evento').set({ nome: novoNome, fase: 'manual' });

    toast('Novo QRS Day iniciado!', 'ok');
    await refresh();
  } catch(e) {
    toast('Erro ao arquivar. Tente novamente.', 'err');
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Novo QRS Day'; }
  }
}

async function adminViewHistorico() {
  const snap = await db.ref('historico').get();
  if (!snap.exists()) { toast('Nenhum QRS Day arquivado ainda.', 'info'); return; }

  const itens = [];
  snap.forEach(c => itens.push({ id: c.key, ...c.val() }));
  itens.sort((a, b) => b.arquivado_em - a.arquivado_em);

  const lista = itens.map(item => {
    const ev = item.evento || {};
    const nProb = Object.keys(item.problemas || {}).length;
    const nComp = Object.keys(item.compromissos || {}).length;
    const data = new Date(item.arquivado_em).toLocaleDateString('pt-BR');
    return `
      <div class="resp-card" style="margin-bottom:14px">
        <div class="resp-card-header">
          <div class="num-badge" style="background:var(--al);color:#8B6914">📅</div>
          <div>
            <div class="resp-card-name">${escHtml(ev.nome || 'QRS Day')}</div>
            <div class="resp-card-setor">Arquivado em ${data} · ${nProb} problemas · ${nComp} compromissos</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" data-hist-prob="${item.id}">📋 Ver Problemas</button>
          <button class="btn btn-outline btn-sm" data-hist-comp="${item.id}">💚 Ver Compromissos</button>
          <button class="btn btn-outline btn-sm" data-hist-pq="${item.id}">📝 Ver Pré-QRS</button>
        </div>
      </div>`;
  }).join('');

  $id('modal-content').innerHTML = `<div class="modal-title">🗂 Histórico de QRS Days</div>${lista}`;
  show('modal');

  // Bind botões de detalhe
  document.querySelectorAll('[data-hist-prob]').forEach(btn => btn.addEventListener('click', () => {
    const item = itens.find(i => i.id === btn.dataset.histProb);
    const probs = Object.values(item.problemas || {});
    const avs = item.avaliacoes || {};
    // calcular scores
    const scores = {};
    Object.values(avs).forEach(a => {
      if (!scores[a.problema_id]) scores[a.problema_id] = { total: 0, count: 0 };
      scores[a.problema_id].total += a.score;
      scores[a.problema_id].count++;
    });
    // fallback para votos antigos
    const votos = item.votos || {};
    const votosPorProb = {};
    Object.values(votos).forEach(v => { votosPorProb[v.problema_id] = (votosPorProb[v.problema_id]||0)+1; });

    const rows = probs.sort((a,b) => (scores[b.id||b.titulo]?.total||0) - (scores[a.id||a.titulo]?.total||0))
      .map((p,i) => {
        const sc = scores[p.id] || {};
        const vt = votosPorProb[p.id] || 0;
        return `<div class="my-card">
          <div class="num-badge">${i+1}</div>
          <div class="my-card-body">
            <div class="my-card-title">${escHtml(p.titulo)}</div>
            <div class="my-card-meta"><span class="chip chip-a">${escHtml(p.setor_responsavel)}</span> · ${escHtml(p.leader_name)}
              ${sc.total ? ` · <strong>${sc.total} pts</strong>` : vt ? ` · <strong>${vt} votos</strong>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
    $id('modal-content').innerHTML = `<button class="btn btn-outline btn-sm" id="btn-back-hist" style="margin-bottom:16px">← Voltar</button>
      <div class="modal-title">Problemas — ${escHtml((item.evento||{}).nome||'')}</div>${rows||'<div class="empty"><div class="empty-t">Sem problemas.</div></div>'}`;
    $id('btn-back-hist').addEventListener('click', adminViewHistorico);
  }));

  document.querySelectorAll('[data-hist-comp]').forEach(btn => btn.addEventListener('click', () => {
    const item = itens.find(i => i.id === btn.dataset.histComp);
    const comps = Object.values(item.compromissos || {});
    const rows = comps.map(c => `<div class="comp-card">
      <div class="comp-card-header">
        <div class="num-badge" style="background:var(--gl);color:var(--g)">✓</div>
        <div><div class="comp-card-name">${escHtml(c.leader_name)}</div><div class="comp-card-setor">${escHtml(c.setor)}</div></div>
      </div>
      ${c.compromissos_assumidos!==undefined ? `
      <div class="comp-item"><div class="comp-item-label">Começar/Continuar — Compromissos assumidos</div><div class="comp-item-value">${escHtml(c.compromissos_assumidos)}</div></div>
      <div class="comp-item"><div class="comp-item-label">Começar/Continuar — Comportamentos positivos</div><div class="comp-item-value">${escHtml(c.comportamentos_positivos)}</div></div>
      <div class="comp-item"><div class="comp-item-label">Cessar/Reduzir</div><div class="comp-item-value">${escHtml(c.cessar_reduzir)}</div></div>
      <div class="comp-item"><div class="comp-item-label">Decisão necessária da liderança</div><div class="comp-item-value">${escHtml(c.decisao_lideranca)}</div></div>` : `
      <div class="comp-item"><div class="comp-item-label">Compromisso 90 dias</div><div class="comp-item-value">${escHtml(c.c90)}</div></div>
      <div class="comp-item"><div class="comp-item-label">Cobrar no próximo QRS</div><div class="comp-item-value">${escHtml(c.cobranca)}</div></div>`}
    </div>`).join('');
    $id('modal-content').innerHTML = `<button class="btn btn-outline btn-sm" id="btn-back-hist" style="margin-bottom:16px">← Voltar</button>
      <div class="modal-title">Compromissos — ${escHtml((item.evento||{}).nome||'')}</div>${rows||'<div class="empty"><div class="empty-t">Sem compromissos.</div></div>'}`;
    $id('btn-back-hist').addEventListener('click', adminViewHistorico);
  }));

  document.querySelectorAll('[data-hist-pq]').forEach(btn => btn.addEventListener('click', () => {
    const item = itens.find(i => i.id === btn.dataset.histPq);
    const resps = Object.values(item.pre_qrs || {});
    const rows = resps.map(r => `<div class="resp-card">
      <div class="resp-card-header">
        <div class="num-badge">${escHtml((r.leader_name||'?').charAt(0))}</div>
        <div><div class="resp-card-name">${escHtml(r.leader_name)}</div><div class="resp-card-setor">${escHtml(r.setor)}</div></div>
      </div>
      ${PRE_QRS_QUESTIONS.map((q,i)=>`<div class="resp-item"><div class="resp-item-label">P${i+1}. ${escHtml(q.label)}</div><div class="resp-item-value">${escHtml(r[q.key]||'—')}</div></div>`).join('')}
    </div>`).join('');
    $id('modal-content').innerHTML = `<button class="btn btn-outline btn-sm" id="btn-back-hist" style="margin-bottom:16px">← Voltar</button>
      <div class="modal-title">Pré-QRS — ${escHtml((item.evento||{}).nome||'')}</div>${rows||'<div class="empty"><div class="empty-t">Sem respostas.</div></div>'}`;
    $id('btn-back-hist').addEventListener('click', adminViewHistorico);
  }));

}

function renderPreQrs() {
  hide('sticky-bar');
  if (S.myPreQrs) {
    const answers = PRE_QRS_QUESTIONS.map((q,i) => `
      <div class="preqrs-q">
        <div class="preqrs-q-num">Pergunta ${i+1}</div>
        <div class="preqrs-q-text">${escHtml(q.label)}</div>
        <div class="preqrs-answer">${escHtml(S.myPreQrs[q.key]||'—')}</div>
      </div>`).join('');

    $id('content-area').innerHTML = `
      ${phaseProgress()}
      <div class="sec-title">Balanço do Trimestre</div>
      <div class="sec-sub">Suas respostas foram enviadas. Obrigada pela transparência!</div>
      <div class="preqrs-done-card">
        <div class="preqrs-done-icon">✅</div>
        <div class="preqrs-done-text">Respostas registradas em ${fmtDate(S.myPreQrs.submitted_at)}.<br>Você pode editar até o início da reunião.</div>
      </div>
      ${answers}
      <button class="btn btn-outline" id="btn-edit-preqrs" style="margin-top:8px">✏️ Editar respostas</button>`;

    $id('btn-edit-preqrs').addEventListener('click', async () => {
      const saved = S.myPreQrs;
      S.myPreQrs = null;
      await renderPhaseContent('pre_qrs');
      if (saved) {
        const ca = $id('content-area');
        PRE_QRS_QUESTIONS.forEach(q => {
          const el = ca.querySelector(`[name="${q.key}"]`);
          if (el) el.value = saved[q.key] || '';
        });
      }
    });
  } else {
    const fields = PRE_QRS_QUESTIONS.map((q,i) => `
      <div class="preqrs-q">
        <div class="preqrs-q-num">Pergunta ${i+1} de ${PRE_QRS_QUESTIONS.length}</div>
        <div class="preqrs-q-text">${escHtml(q.label)}</div>
        <div class="field" style="margin:0"><textarea name="${q.key}" required placeholder="Escreva aqui com honestidade…" rows="3"></textarea></div>
      </div>`).join('');

    $id('content-area').innerHTML = `
      ${phaseProgress()}
      <div class="sec-title">Balanço do Trimestre</div>
      <div class="sec-sub">Responda antes da reunião. Suas respostas guiarão as discussões do dia.</div>
      <div class="info-box blue"><strong>Dica:</strong> Seja direto e honesto. O objetivo é chegar ao QRS Day preparado para decidir, não apenas para relatar.</div>
      <form id="form-preqrs">${fields}
        <div style="display:flex;align-items:center;margin-top:8px">
          <button type="submit" class="btn btn-primary">💾 Enviar respostas</button>
          <span class="draft-ind"></span>
        </div>
      </form>`;

    // Pré-preenche com rascunho salvo
    const draftPq = loadDraft('preqrs');
    if (draftPq) PRE_QRS_QUESTIONS.forEach(q => { const el = $id('form-preqrs').elements[q.key]; if (el && draftPq[q.key]) el.value = draftPq[q.key]; });

    const formPq = $id('form-preqrs');
    bindAutosave('preqrs', formPq, f => { const d={}; PRE_QRS_QUESTIONS.forEach(q => { d[q.key] = f.elements[q.key]?.value || ''; }); return d; });

    formPq.addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target, btn = f.querySelector('[type=submit]');
      btn.disabled = true; btn.textContent = 'Salvando…';
      const data = {};
      PRE_QRS_QUESTIONS.forEach(q => { data[q.key] = f[q.key]?.value.trim() || ''; });
      try { await savePreQrs(data); clearDraft('preqrs'); toast('Respostas salvas!', 'ok'); await renderPhaseContent('pre_qrs'); }
      catch(err) { toast('Erro ao salvar.', 'err'); btn.disabled=false; btn.textContent='Enviar respostas'; }
    });
  }
}

          <span>${escHtml(ind.base)}: <strong>${escHtml(String(ind.valor_base))} ${escHtml(ind.unidade)}</strong></span>
        </div>
      </div>`).join('') || '<div class="sec-sub">Nenhum indicador enviado.</div>';

    $id('content-area').innerHTML = `
      ${phaseProgress()}
      <div class="sec-title">Indicadores</div>
      <div class="sec-sub">Seus indicadores foram enviados.</div>
      <div class="preqrs-done-card">
        <div class="preqrs-done-icon">✅</div>
        <div class="preqrs-done-text">Indicadores registrados em ${fmtDate(S.myIndicadores.submitted_at)}.<br>Você pode editar até o início da reunião.</div>
      </div>
      ${cards}
      <button class="btn btn-outline" id="btn-edit-ind" style="margin-top:8px">✏️ Editar indicadores</button>`;

    $id('btn-edit-ind').addEventListener('click', async () => {
      const saved = S.myIndicadores;
      S.myIndicadores = null;
      await renderPhaseContent('indicadores');
      if (saved) {
        const ca = $id('content-area');
        [0,1,2].forEach(j => {
          const ind = saved[`ind${j+1}`];
          if (!ind) return;
          const q = n => ca.querySelector(`[name="${n}"]`);
          if (q(`nome${j}`))        q(`nome${j}`).value        = ind.nome        || '';
          if (q(`valor_atual${j}`)) q(`valor_atual${j}`).value = ind.valor_atual || '';
          if (q(`unidade${j}`))     q(`unidade${j}`).value     = ind.unidade     || '';
          if (q(`tendencia${j}`))   q(`tendencia${j}`).value   = ind.tendencia   || 'estavel';
          if (q(`base${j}`))        q(`base${j}`).value        = ind.base        || '';
          if (q(`valor_base${j}`))  q(`valor_base${j}`).value  = ind.valor_base  || '';
        });
      }
    });
  } else {
    const slots = [0,1,2].map(i => `
      <div class="ind-card">
        <div class="ind-card-title">Indicador ${i+1} ${i>0?'(opcional)':''}</div>
        <div class="ind-tip">💡 ${IND_TIPS[i]}</div>
        <div class="field" style="margin-bottom:10px">
          <label>Nome do indicador</label>
          <input type="text" name="nome${i}" placeholder="Ex.: Taxa de turnover, NPS, custo por contratação…" ${i===0?'required':''}>
        </div>
        <div class="ind-row">
          <div class="field" style="margin:0">
            <label>Valor atual</label>
            <input type="text" name="valor_atual${i}" placeholder="Ex.: 12">
          </div>
          <div class="field" style="margin:0">
            <label>Unidade</label>
            <select name="unidade${i}">${IND_UNIDADES.map(u=>`<option value="${u}">${u}</option>`).join('')}</select>
          </div>
          <div class="field" style="margin:0">
            <label>Tendência</label>
            <select name="tendencia${i}">
              <option value="melhorou">▲ Melhorou</option>
              <option value="estavel">● Estável</option>
              <option value="piorou">▼ Piorou</option>
            </select>
          </div>
        </div>
        <div class="ind-row2">
          <div class="field" style="margin:0">
            <label>Comparar com</label>
            <select name="base${i}">${IND_BASES.map(b=>`<option value="${b}">${b}</option>`).join('')}</select>
          </div>
          <div class="field" style="margin:0">
            <label>Valor de comparação</label>
            <input type="text" name="valor_base${i}" placeholder="Ex.: 18">
          </div>
          <div></div>
        </div>
      </div>`).join('');

    $id('content-area').innerHTML = `
      ${phaseProgress()}
      <div class="sec-title">Indicadores</div>
      <div class="sec-sub">Compartilhe até 3 indicadores do seu setor neste trimestre.</div>
      <div class="info-box blue"><strong>Dica:</strong> Escolha números que mostrem a real direção do seu setor — para o bem ou para o mal. Indicadores servem para decidir, não para impressionar.</div>
      <form id="form-ind">${slots}
        <div style="display:flex;align-items:center;margin-top:8px">
          <button type="submit" class="btn btn-primary">💾 Enviar indicadores</button>
          <span class="draft-ind"></span>
        </div>
      </form>`;

    // Pré-preenche com rascunho salvo
    const draftInd = loadDraft('ind');
    if (draftInd) {
      const fi = $id('form-ind');
      Object.entries(draftInd).forEach(([k,v]) => { const el = fi.elements[k]; if (el) el.value = v; });
    }
    bindAutosave('ind', $id('form-ind'), f => { const d={}; [0,1,2].forEach(i => ['nome','valor_atual','unidade','tendencia','base','valor_base'].forEach(k => { const el=f.elements[k+i]; if(el) d[k+i]=el.value; })); return d; });

    $id('form-ind').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target, btn = f.querySelector('[type=submit]');
      btn.disabled = true; btn.textContent = 'Salvando…';
      const inds = [0,1,2].map(i => {
        const nome = f[`nome${i}`]?.value.trim();
        if (!nome) return null;
        return {
          nome,
          valor_atual: f[`valor_atual${i}`]?.value.trim() || '',
          unidade: f[`unidade${i}`]?.value || '',
          tendencia: f[`tendencia${i}`]?.value || 'estavel',
          base: f[`base${i}`]?.value || '',
          valor_base: f[`valor_base${i}`]?.value.trim() || '',
        };
      });
      if (!inds[0]) { toast('Preencha ao menos o Indicador 1.', 'err'); btn.disabled=false; btn.textContent='Enviar indicadores'; return; }
      try { await saveIndicadores(inds); clearDraft('ind'); toast('Indicadores salvos!', 'ok'); await renderPhaseContent('indicadores'); }
      catch(err) { toast('Erro ao salvar.', 'err'); btn.disabled=false; btn.textContent='Enviar indicadores'; }
    });
  }
}

function renderSubmissao() {
  hide('sticky-bar');
  const mine = S.problemas.filter(p => Number(p.leader_id) === Number(S.leader.id));
  const adminTab   = S.leader.isAdmin ? `<button class="tab" data-tab="todos">📂 Todos (${S.problemas.length})</button>` : '';
  const adminPanel = S.leader.isAdmin ? `<div id="tab-todos" hidden>${renderAllProblems()}</div>` : '';
  const tabKeys    = S.leader.isAdmin ? ['cadastrar','meus','todos'] : ['cadastrar','meus'];

  $id('content-area').innerHTML = `
    ${phaseProgress()}
    <div class="tabs">
      <button class="tab active" data-tab="cadastrar">✏️ Cadastrar Problema</button>
      <button class="tab" data-tab="meus">📋 Meus (${mine.length})</button>
      ${adminTab}
    </div>
    <div id="tab-cadastrar">${renderForm()}</div>
    <div id="tab-meus" hidden>${renderMyProblems(mine)}</div>
    ${adminPanel}`;

  document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tabKeys.forEach(t => { const el=$id(`tab-${t}`); if(el) el.hidden=(t!==btn.dataset.tab); });
  }));

  document.querySelectorAll('#toggle-tipo-entrada .tipo-card').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('#toggle-tipo-entrada .tipo-card').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tipo = btn.dataset.tipo;
    $id('form-problem').dataset.tipo = tipo;
    $id('bloco-problema').hidden = tipo !== 'problema';
    $id('bloco-conflito').hidden = tipo !== 'conflito';
  }));

  $id('form-problem')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target, btn = f.querySelector('[type=submit]');
    const tipo = f.dataset.tipo;
    btn.disabled=true; btn.textContent='Salvando…';
    try {
      if (tipo === 'conflito') {
        const titulo = f.titulo_conflito.value.trim(), setor_responsavel = f.setor_responsavel_conflito.value;
        const tensao = f.tensao.value.trim(), impacto_conflito = f.impacto_conflito.value.trim();
        const acordo = f.acordo.value.trim(), dono = f.dono.value.trim();
        if (!titulo || !setor_responsavel || !tensao || !impacto_conflito || !acordo || !dono) {
          toast('Preencha todos os campos do conflito.', 'err'); btn.disabled=false; btn.textContent='Salvar'; return;
        }
        await submitProblem({ tipo:'conflito', titulo, setor_responsavel, tensao, impacto_conflito, acordo, dono });
      } else {
        await submitProblem({
          tipo:'problema',
          titulo: f.titulo.value.trim(), setor_responsavel: f.setor_responsavel.value,
          descricao_resumida: f.descricao_resumida.value.trim(),
          impacto_interno: f.impacto_interno.value.trim(),
          impacto_externo: f.impacto_externo.value.trim(),
          custo_direto: f.custo_direto.value.trim(),
          custo_oportunidade: f.custo_oportunidade.value.trim(),
        });
      }
      toast(tipo === 'conflito' ? 'Conflito cadastrado!' : 'Problema cadastrado!', 'ok');
      await loadProblemas(); await renderPhaseContent('submissao');
      // Abre a aba "Meus" para o líder ver o que foi salvo
      const tabMeus = document.querySelector('.tab[data-tab="meus"]');
      if (tabMeus) tabMeus.click();
    } catch(err) { toast('Erro ao salvar.', 'err'); btn.disabled=false; btn.textContent='Salvar'; }
  });

  document.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('Remover este problema?')) return;
    try { await deleteProblem(btn.dataset.delete); toast('Removido.', 'info'); await loadProblemas(); renderSubmissao(); }
    catch(e) { toast('Erro ao remover.', 'err'); }
  }));

  document.querySelectorAll('[data-view]').forEach(btn =>
    btn.addEventListener('click', () => openModal(S.problemas.find(p => p.id === btn.dataset.view))));
}

}

  return list.map((p,i) => `

function renderAllProblems() {
  if (!S.problemas.length) return `<div class="empty"><div class="empty-icon">📭</div><div class="empty-t">Nenhum problema ainda.</div></div>`;

function renderVotacao() {
  const rated = Object.keys(S.myAvaliacoes).length;
  const total = S.problemas.length;
  show('sticky-bar');
  $id('sticky-bar').innerHTML = `<div style="background:var(--pd);color:#fff;padding:9px 24px;text-align:center;font-size:14px">
    <strong style="font-family:Montserrat,sans-serif;font-size:18px">${rated}</strong>/${total} problemas avaliados
  </div>`;

  $id('content-area').innerHTML = `
    ${phaseProgress()}
    <div class="sec-title">Avalie os Problemas</div>
    <div class="sec-sub">Para cada problema, dê uma nota de 1 a 3 em três critérios. O score é o produto das três notas (máx. 27). Clique em "Avaliar" para abrir o formulário.</div>
    <div class="info-box blue">
      <strong>Critérios de avaliação:</strong><br>
      🎯 <strong>Impacto</strong> — Quanto isso afeta resultado, cliente ou equipe?<br>
      ⚡ <strong>Urgência</strong> — Se não resolvermos agora, piora nos próximos 90 dias?<br>
      🔧 <strong>Controle</strong> — A liderança aqui presente consegue agir sobre isso?
    </div>
    <div id="problems-list">${renderRatingCards()}</div>`;

  bindRatingCards();
}

function renderRatingCards() {
  if (!S.problemas.length) return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-t">Nenhum problema cadastrado.</div></div>`;
  return S.problemas.map((p,i) => {
    const av = S.myAvaliacoes[p.id];
    return `
    <div class="v-card${av?' rated':''}${p.tipo==='conflito'?' conflito-card':''}" data-id="${p.id}">
      <div class="v-card-head">
        <div class="num-badge">${i+1}</div>
        <div class="v-card-info">
          <div class="v-card-title">${escHtml(p.titulo)}</div>
          <div class="v-card-meta">${tipoChip(p)} <span class="chip chip-a">${escHtml(p.setor_responsavel)}</span> · ${escHtml(p.leader_name)}</div>
        </div>
        <div class="v-card-arrow">▾</div>
      </div>
      <div class="v-card-body">${detailGrid(p)}</div>
      <div class="v-card-footer">
        ${av ? `<div>
          <span class="rated-label">✓ Avaliado</span>
          <div class="score-preview" style="margin-top:6px">
            🎯${av.impacto} ⚡${av.urgencia} 🔧${av.controle} · <strong>Score: ${av.score}/27</strong>
          </div></div>` : '<span></span>'}
        <button class="btn ${av?'btn-outline':'btn-primary'} btn-sm" data-rate="${p.id}">
          ${av ? '✏️ Reeditar' : '🎯 Avaliar'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function bindRatingCards() {
  document.querySelectorAll('.v-card-head').forEach(h => h.addEventListener('click', (e) => {
    if (e.target.closest('[data-rate]')) return;
    const card = h.closest('.v-card');
    card.classList.toggle('open');
    card.querySelector('.v-card-body').style.display = card.classList.contains('open') ? 'block' : 'none';
  }));
  document.querySelectorAll('[data-rate]').forEach(btn =>
    btn.addEventListener('click', (e) => { e.stopPropagation(); openRatingModal(btn.dataset.rate); }));
}

function openRatingModal(problemaId) {
  const p = S.problemas.find(x => x.id === problemaId);
  const existing = S.myAvaliacoes[problemaId];
  const ev = (c,v) => existing?.[c] === v;

  const critHtml = (key, label, hint, emoji) => `
    <div class="crit-section">
      <div class="crit-label">${emoji} ${label}</div>
      <div class="crit-hint">${hint}</div>
      <div class="crit-btns">
        ${[1,2,3].map(v => `<button class="crit-btn${ev(key,v)?' sel':''}" data-key="${key}" data-val="${v}">${v}</button>`).join('')}
      </div>
    </div>`;

  $id('modal-content').innerHTML = `
    <div class="modal-title">Avaliar Problema</div>
    <div style="margin-bottom:20px">
      <strong style="font-size:15px">${escHtml(p.titulo)}</strong><br>
      <span class="chip chip-a" style="margin-top:6px">${escHtml(p.setor_responsavel)}</span>
    </div>
    ${critHtml('impacto','Impacto no Negócio','Quanto isso afeta resultado, cliente ou equipe?','🎯')}
    ${critHtml('urgencia','Urgência','Se não resolvermos agora, piora nos próximos 90 dias?','⚡')}
    ${critHtml('controle','Controlabilidade','A liderança aqui presente consegue agir sobre isso?','🔧')}
    <div class="crit-score-total" id="score-preview">
      <span>Selecione os critérios para ver o score</span>
    </div>
    <button class="btn btn-primary btn-full" id="btn-save-rating" style="margin-top:18px" disabled>💾 Salvar Avaliação</button>`;

  show('modal');

  const vals = existing ? { impacto:existing.impacto, urgencia:existing.urgencia, controle:existing.controle } : {};

  function updateScore() {
    const { impacto, urgencia, controle } = vals;
    if (impacto && urgencia && controle) {
      const total = impacto * urgencia * controle;
      $id('score-preview').innerHTML = `<strong>${total}</strong><span>/27 — Score desta avaliação (${impacto}×${urgencia}×${controle})</span>`;
      $id('btn-save-rating').disabled = false;
    }
  }

  if (existing) updateScore();

  document.querySelectorAll('.crit-btn').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.key, val = parseInt(btn.dataset.val);
    document.querySelectorAll(`.crit-btn[data-key="${key}"]`).forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    vals[key] = val;
    updateScore();
  }));

  $id('btn-save-rating').addEventListener('click', async () => {
    const saveBtn = $id('btn-save-rating');
    saveBtn.disabled=true; saveBtn.textContent='Salvando…';
    try {
      await saveAvaliacao(problemaId, vals.impacto, vals.urgencia, vals.controle);
      hide('modal'); toast('Avaliação salva!', 'ok');
      $id('problems-list').innerHTML = renderRatingCards(); bindRatingCards();
      // update sticky bar
      const rated = Object.keys(S.myAvaliacoes).length;
      $id('sticky-bar').querySelector('strong').textContent = rated;
    } catch(e) { toast('Erro ao salvar.', 'err'); saveBtn.disabled=false; saveBtn.textContent='Salvar Avaliação'; }
  });
}

  if (S.myCompromisso) {

      </div>
      <div class="comp-item">

      </div>
    </div>

  } else {
    html += `<div class="info-box green"><strong>Seja específico.</strong> Em vez de "vou melhorar comunicação", escreva: "vou garantir que toda implantação tenha checklist, responsável e data de go-live registrada."</div>

      <div class="form-block-title">Começar / Continuar</div>
      <div class="field">
        <label>Compromissos assumidos — o que de fato vou entregar além do que pretendia *</label>
        <textarea id="inp-compromissos-assumidos" required rows="3" placeholder="Seja específico: o que vai mudar, com que métrica e quem vai ver?"></textarea>
      </div>
      <div class="field">
        <label>Comportamentos positivos *</label>
        <textarea id="inp-comportamentos-positivos" required rows="3" placeholder="Que comportamento eu vou começar ou continuar a praticar?"></textarea>
      </div>
    </div>
    <div class="form-block">
      <div class="form-block-title">Cessar / Reduzir</div>
      <div class="field">
        <label>Atividades e comportamentos *</label>
        <textarea id="inp-cessar-reduzir" required rows="3" placeholder="O que eu vou parar de fazer ou fazer menos?"></textarea>
      </div>
    </div>
    <div class="form-block">
      <div class="form-block-title">Liderança</div>
      <div class="field">
        <label>Que decisão eu preciso que a liderança tome para eu entregar? *</label>
        <textarea id="inp-decisao-lideranca" required rows="3" placeholder="Ex: Aprovação de orçamento, definição de prioridade, contratação…"></textarea>
      </div>
    </div>
    <div style="display:flex;align-items:center;margin-top:8px">
      <button class="btn btn-green" id="btn-save-comp">💚 Registrar compromisso</button>
      <span class="draft-ind" id="draft-ind-comp"></span>
    </div>`;
  }

  $id('content-area').innerHTML = html;

  if ($id('btn-save-comp')) {
    // Pré-preenche com rascunho salvo
    const draftComp = loadDraft('comp');
    if (draftComp) {
      ['compromissos_assumidos','comportamentos_positivos','cessar_reduzir','decisao_lideranca'].forEach(k => {
        const el = $id('inp-' + k.replace(/_/g,'-'));
        if (el && draftComp[k]) el.value = draftComp[k];
      });
    }
    // Auto-save ao digitar
    const compFields = ['inp-compromissos-assumidos','inp-comportamentos-positivos','inp-cessar-reduzir','inp-decisao-lideranca'];
    const compKeys   = ['compromissos_assumidos','comportamentos_positivos','cessar_reduzir','decisao_lideranca'];
    const ind = $id('draft-ind-comp');
    let compTimer;
    const saveCompDraft = () => {
      const d = {}; compKeys.forEach((k,i) => { d[k] = $id(compFields[i])?.value || ''; });
      saveDraft('comp', d);
      if (ind) { ind.textContent='✓ Rascunho salvo'; ind.style.opacity='1'; clearTimeout(ind._t); ind._t=setTimeout(()=>ind.style.opacity='0',2500); }
    };
    compFields.forEach(id => {
      const el = $id(id);
      if (el) { el.addEventListener('input', () => { clearTimeout(compTimer); compTimer=setTimeout(saveCompDraft,900); }); }
    });

    $id('btn-save-comp').addEventListener('click', async () => {
      const compromissos_assumidos = $id('inp-compromissos-assumidos')?.value.trim();
      const comportamentos_positivos = $id('inp-comportamentos-positivos')?.value.trim();
      const cessar_reduzir = $id('inp-cessar-reduzir')?.value.trim();
      const decisao_lideranca = $id('inp-decisao-lideranca')?.value.trim();
      if (!compromissos_assumidos || !comportamentos_positivos || !cessar_reduzir || !decisao_lideranca) {
        toast('Preencha todos os campos.', 'err'); return;
      }
      const btn = $id('btn-save-comp'); btn.disabled=true; btn.textContent='Salvando…';
      try {
        await saveCompromisso({ compromissos_assumidos, comportamentos_positivos, cessar_reduzir, decisao_lideranca });
        clearDraft('comp'); toast('Compromisso registrado!', 'ok'); await renderCompromissos();
      }
      catch(e) { toast('Erro ao salvar.', 'err'); btn.disabled=false; btn.textContent='Registrar compromisso'; }
    });
  }

  $id('btn-edit-comp')?.addEventListener('click', () => { S.myCompromisso = null; renderCompromissos(); });
}

async function renderEncerrado() {
  hide('sticky-bar');
  const scores = await getScores();
  const ranked = [...S.problemas].sort((a,b) => (scores[b.id]?.total||0) - (scores[a.id]?.total||0));
  const maxScore = scores[ranked[0]?.id]?.total || 1;

  const cards = ranked.map((p,i) => {
    const s = scores[p.id] || { impacto:0, urgencia:0, controle:0, total:0, count:0 };
    return `
    <div class="res-card ${i===0?'res-rank-1':''}">
      <div class="rank">${i===0?'🥇':`#${i+1}`}</div>
      <div class="res-info">
        <div class="res-title">${escHtml(p.titulo)}</div>
        <div class="res-meta">${tipoChip(p)} <span class="chip chip-a">${escHtml(p.setor_responsavel)}</span> · ${escHtml(p.leader_name)}</div>
        <div class="res-criteria">
          <span class="res-crit-item">🎯 Impacto <strong>${s.impacto}</strong></span>
          <span class="res-crit-item">⚡ Urgência <strong>${s.urgencia}</strong></span>
          <span class="res-crit-item">🔧 Controle <strong>${s.controle}</strong></span>
          <span class="res-crit-item">${s.count} avaliações</span>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${Math.round((s.total/maxScore)*100)}%"></div></div>
      </div>
      <div class="res-score"><strong>${s.total}</strong><small>pontos</small></div>
    </div>`;
  }).join('');

  $id('content-area').innerHTML = `
    ${phaseProgress()}
    <div class="sec-title">Resultado do QRS Day</div>
    <div class="sec-sub">${escHtml(S.evento.nome)} · Ranking por score (Impacto × Urgência × Controle)</div>
    ${cards || '<div class="empty"><div class="empty-t">Nenhuma avaliação registrada.</div></div>'}`;
}

async function adminViewIndicadores() {
  // Leitura direta do Firebase — garante dados frescos de todos os líderes
  const snap = await db.ref('indicadores').get();
  if (!snap.exists()) { toast('Nenhum indicador enviado ainda.', 'info'); return; }

  const entries = [];
  snap.forEach(child => { if (child.val()) entries.push(child.val()); });

  const faltam = LEADERS.filter(l => !entries.find(e => String(e.leader_id) === String(l.id)));

  // Agrupa por setor, ordenado
  const bySetor = {};
  entries.forEach(r => {
    const s = r.setor || 'Sem setor';
    if (!bySetor[s]) bySetor[s] = [];
    bySetor[s].push(r);
  });

  hide('sticky-bar');
  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" id="btn-back-ind">← Voltar</button>

    </div>`;

  let chartIdx = 0;
  const allCharts = [];

  Object.entries(bySetor).sort(([a],[b]) => a.localeCompare(b)).forEach(([setor, leaders]) => {
    html += `<div style="margin:18px 0 10px;padding:7px 14px;background:var(--p);color:#fff;border-radius:8px;font-weight:700;font-family:Montserrat,sans-serif;font-size:14px;letter-spacing:.3px">
      ${escHtml(setor)}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:4px">`;

    leaders.forEach(r => {
      const slots = [1,2,3].map(i => r[`ind${i}`]).filter(Boolean);
      const ci = chartIdx;
      html += `<div class="resp-card" style="margin:0">
        <div class="resp-card-header">
          <div class="num-badge">${escHtml(r.leader_name?.charAt(0)||'?')}</div>
          <div>
            <div class="resp-card-name">${escHtml(r.leader_name)}</div>
            <div class="resp-card-setor">${escHtml(r.setor)} · ${fmtDate(r.submitted_at)}</div>
          </div>
        </div>
        ${slots.map((ind, i) => `
          <div class="ind-display" style="margin-bottom:8px">
            <div class="ind-display-name">${escHtml(ind.nome)} ${indTrendBadge(ind.tendencia)}</div>
            <div class="ind-display-vals" style="margin-bottom:6px">
              <span>Atual: <strong>${escHtml(String(ind.valor_atual))} ${escHtml(ind.unidade)}</strong></span>
              <span>${escHtml(ind.base)}: <strong>${escHtml(String(ind.valor_base))} ${escHtml(ind.unidade)}</strong></span>
            </div>
            <canvas class="ind-chart" id="ind-chart-${ci}-${i}"></canvas>
          </div>`).join('')}
      </div>`;
      allCharts.push({ r, ci });
      chartIdx++;
    });

    html += `</div>`;
  });

  $id('content-area').innerHTML = html;
  bindPhaseProgressNav();

  $id('btn-back-ind').addEventListener('click', () => renderPhaseContent(S.viewFase));

  // Renderiza gráficos
  allCharts.forEach(({ r, ci }) => {
    const slots = [1,2,3].map(i => r[`ind${i}`]).filter(Boolean);
    slots.forEach((ind, i) => {
      const canvas = $id(`ind-chart-${ci}-${i}`);
      if (!canvas) return;
      const atual = parseFloat(String(ind.valor_atual).replace(',', '.')) || 0;
      const base  = parseFloat(String(ind.valor_base).replace(',', '.'))  || 0;
      new Chart(canvas, {
        type: 'bar',
        data: {
          labels: [ind.base, 'Atual'],
          datasets: [{ data: [base, atual], backgroundColor: ['#94A3B8', ind.tendencia === 'melhorou' ? '#0F766E' : ind.tendencia === 'piorou' ? '#DC2626' : '#64748B'] }],
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { beginAtZero: true } },
        },
      });
    });
  });
}
